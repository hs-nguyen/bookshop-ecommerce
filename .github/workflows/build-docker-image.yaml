name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: fcaj-bookshop-ecr
  ECR_REGISTRY: 891377055161.dkr.ecr.ap-southeast-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  TASK_FAMILY: bookshop-task
  CLUSTER_NAME: fcaj-bookshop-cluster

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::891377055161:role/GithubActionsRole
          role-session-name: GithubActionsSession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image 
        run: |
          docker build \
            -t ${ECR_REPOSITORY}:latest \
            -f ./backend/Dockerfile \
            ./backend

          docker tag ${ECR_REPOSITORY}:latest ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
      - name: Push image to ECR
        run: | 
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
  deploy:
    name: Deploy to ECS Cluster
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::891377055161:role/GithubActionsRole
          role-session-name: GithubActionsSession

      - name: Deploy to ECS
        run: |
          aws ecs update-task-definition \
            --family ${TASK_FAMILY} \
            --container-images bookshop-container=${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

          aws ecs create-service \ 
            --cluster ${CLUSTER_NAME} \
            --service-name fcaj-bookshop-service \
            --task-definition ${TASK_FAMILY} \
            --desired-count 2 \
            --launch-type FARGATE \
            --network-configuration 'awsvpcConfiguration={subnets=["subnet-04d0d419244f8a2bb" , "subnet-04b35af3dac2ca51a"],securityGroups=["sg-0829f4a93bc89746b"],assignPublicIp="ENABLED"}'

