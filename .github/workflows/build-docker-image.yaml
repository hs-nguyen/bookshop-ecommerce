name: Build Docker Image
on: 
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: fcaj-bookshop-ecr
  IMAGE_TAG: latest
jobs:
  deploy:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::891377055161:role/GithubActionsRole
          role-session-name: GithubActionsRole 
      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and Push Docker Image
        run: |
          docker build -t fcaj-bookshop-ecr -f ./backend/Dockerfile .
          docker tag fcaj-bookshop-ecr:latest 891377055161.dkr.ecr.ap-southeast-1.amazonaws.com/fcaj-bookshop-ecr:latest
          docker push 891377055161.dkr.ecr.ap-southeast-1.amazonaws.com/fcaj-bookshop-ecr:latest
          echo "build and push docker image successfully"

