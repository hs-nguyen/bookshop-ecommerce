  build:
    name: Build and Push Dock er Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        oidc-token: ${{ secrets.AWS_OIDC_TOKEN }}
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsRole
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GithubActionsRole
    
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build docker image
      run: |
        docker build -f backend/Dockerfile -t ${{ env.ECR_REPOSITORY }}:latest ./backend/
    
    - name: Tag and push docker image to ECR
      run: |
        docker tag ${{ env.ECR_REPOSITORY }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
    - name: output success message
      run: echo "Docker image built and pushed to ECR successfully!"
  
